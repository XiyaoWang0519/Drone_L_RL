# ============================================================================
# DWM3001CDK USB CDC-ACM Hello World Configuration
# ============================================================================
# This configuration enables USB CDC-ACM (serial over USB) communication
# for console output and logging via connector J20.

# ============================================================================
# Core System Components
# ============================================================================

# Enable serial communication subsystem
# Foundation for UART/console communication (required for USB CDC)
CONFIG_SERIAL=y

# Enable console subsystem for debug output
# Allows the system to print messages to configured console device
CONFIG_CONSOLE=y

# Enable kernel printing functions (printk)
# Provides the actual printing APIs used in the application
CONFIG_PRINTK=y

# Enable runtime assertions
# Helps catch programming errors during development
CONFIG_ASSERT=y

# ============================================================================
# USB CDC-ACM Console Configuration
# ============================================================================

# Enable USB device stack
# Required for any USB device functionality on nRF52833
CONFIG_USB_DEVICE_STACK=y

# Enable USB CDC-ACM (Communication Device Class - Abstract Control Model)
# This creates a virtual serial port over USB that appears as /dev/ttyACM*
# on Linux or a COM port on Windows
CONFIG_USB_CDC_ACM=y

# Enable UART console subsystem
# Routes console output through UART devices (including USB CDC-ACM)
CONFIG_UART_CONSOLE=y

# ============================================================================
# Optional Features (Development/Debug Aids)
# ============================================================================

# Enable logging subsystem
# Provides structured logging capabilities beyond simple printk
CONFIG_LOG=y

# Set logging mode to immediate
# Log messages are printed immediately rather than being buffered
# This ensures timely output but may impact performance
CONFIG_LOG_MODE_IMMEDIATE=y

# ============================================================================
# USB Device Identification
# ============================================================================

# USB product string (appears in device manager/system information)
# This helps identify the device when multiple USB devices are connected
CONFIG_USB_DEVICE_PRODUCT="DWM3001CDK CDC ACM"

# USB Vendor ID (VID) and Product ID (PID)
# These identify the device to the host operating system:
# - VID 0x2FE3: Assigned to Qorvo (manufacturer of DWM3001CDK)
# - PID 0x0100: Product-specific identifier for this CDC-ACM device
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100
