# Console over USB CDC ACM
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# USB device stack + CDC ACM class
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

# Core drivers and utilities
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_THREAD_NAME=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Logging to RTT in addition to USB printk

#CONFIG_LOG=y
#CONFIG_LOG_MODE_IMMEDIATE=y
#CONFIG_LOG_BACKEND_RTT=y
#CONFIG_USE_SEGGER_RTT=y
#CONFIG_LOG_BACKEND_UART=n
#CONFIG_LOG_DEFAULT_LEVEL=3

# Allow optional button & LED helpers
CONFIG_GPIO_NRFX=y

# RTT console alongside USB console (for SEGGER host tools)
#CONFIG_RTT_CONSOLE=y

