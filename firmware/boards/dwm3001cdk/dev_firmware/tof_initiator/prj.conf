# Console over USB CDC ACM
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# USB device stack + CDC ACM class
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="DWM3001CDK CDC ACM"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100

# Core drivers and utilities
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_THREAD_NAME=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Logging routed to USB console
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=n
CONFIG_LOG_BACKEND_RTT=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_DEFAULT_LEVEL=3

# Allow optional button & LED helpers
CONFIG_GPIO_NRFX=y

# Disable RTT console so printk/logs go to USB only
CONFIG_RTT_CONSOLE=n
