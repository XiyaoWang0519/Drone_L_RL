# Console over USB CDC (J20) using classic USB stack
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Classic USB device stack + CDC ACM
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

# Core drivers and debug
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_THREAD_NAME=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Optional logging (immediate to avoid buffering over CDC)
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
