# Console over USB CDC ACM
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# USB device stack + CDC ACM class
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="DWM3001CDK UWB Drone RX"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0102

# Core drivers
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_THREAD_NAME=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096

# Receiver configuration
CONFIG_UWB_DRONE_RX_WAIT_MS=200
CONFIG_UWB_DRONE_IDLE_LOG_PERIOD=100
CONFIG_UWB_DRONE_EPOCH_TIMEOUT_MS=30
CONFIG_UWB_DRONE_EMIT_EPOCH_LOG=y
CONFIG_UWB_DRONE_EMIT_BIN_HEX=y
CONFIG_UWB_DRONE_ANCHOR_ID_1=1
CONFIG_UWB_DRONE_ANCHOR_ID_2=2
CONFIG_UWB_DRONE_ANCHOR_ID_3=3
CONFIG_UWB_DRONE_ANCHOR_ID_4=4
CONFIG_UWB_DRONE_DEFAULT_Q_NS2_X10000=225
