# ============================================================================
# DWM3001CDK LED Bring-up Configuration
# ============================================================================
# This is a minimal configuration for basic GPIO control and console output.
# The app demonstrates LED blinking as a hardware validation test.

# Enable GPIO driver for LED control
# Required for gpio_pin_*() APIs and GPIO_DT_SPEC_GET()
CONFIG_GPIO=y

# Enable serial communication subsystem
# Provides the foundation for console output (though we don't use it here)
CONFIG_SERIAL=y

# Enable console subsystem for debug output
# Allows kernel to print messages (though our app doesn't use printk)
CONFIG_CONSOLE=y

# ============================================================================
# Optional: USB CDC-ACM Console (uncomment to enable)
# ============================================================================
# If you want to add USB serial console support later for debugging:
#
# CONFIG_USB_DEVICE_STACK=y         # Enable USB device stack
# CONFIG_USB_CDC_ACM=y             # Enable USB CDC-ACM (serial over USB)
# CONFIG_UART_CONSOLE=y            # Enable UART console subsystem
# CONFIG_UART_CONSOLE_ON_DEV_NAME="CDC_ACM_0"  # Route console to USB CDC device
#
# With these enabled, you could add USB logging and connect to the board
# via USB on connector J20 instead of using SWD/JTAG.
