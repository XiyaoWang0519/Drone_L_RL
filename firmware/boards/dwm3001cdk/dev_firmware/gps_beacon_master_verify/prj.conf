# Console over USB CDC ACM
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# USB device stack + CDC ACM class
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_PRODUCT="DWM3001CDK UWB Beacon Master Verify"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0101

# Core drivers
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_THREAD_NAME=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Beacon configuration
CONFIG_ROLE_MASTER_ANCHOR=y
CONFIG_UWB_BEACON_ID=1
CONFIG_UWB_BEACON_SLOT_ID=0
CONFIG_UWB_BEACON_FLAGS=0
CONFIG_UWB_SUPERFRAME_UUS=20000
CONFIG_UWB_SLOT_START_UUS=10000
CONFIG_UWB_SLOT_UUS=2000
CONFIG_UWB_TX_GUARD_UUS=1000
CONFIG_UWB_TX_START_DELAY_UUS=2000
CONFIG_UWB_TX_TIMEOUT_MS=100
CONFIG_UWB_SLAVE_RX_WAIT_MS=100
CONFIG_UWB_SLAVE_IDLE_LOG_PERIOD=200
