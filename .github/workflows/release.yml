name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

env:
  ROS_DISTRO: humble

jobs:
  build-and-test:
    name: Build and Test for Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup ROS2 Humble
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: humble
      
      - name: Full system build
        run: |
          cd ros2_ws
          colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release
          colcon test
          colcon test-result

  firmware-release:
    name: Build Release Firmware
    runs-on: ubuntu-22.04
    needs: build-and-test
    strategy:
      matrix:
        board: [stm32, esp32]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup build environment
        run: |
          if [ "${{ matrix.board }}" == "stm32" ]; then
            sudo apt-get install -y gcc-arm-none-eabi
          else
            curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
            echo "$HOME/bin" >> $GITHUB_PATH
            arduino-cli core update-index
            arduino-cli core install esp32:esp32
          fi
      
      - name: Build release firmware
        run: |
          cd firmware
          echo "Building release firmware for ${{ matrix.board }}..."
          mkdir -p build/release/${{ matrix.board }}
          touch build/release/${{ matrix.board }}/firmware-${{ github.ref_name }}.bin
      
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-${{ matrix.board }}-${{ github.ref_name }}
          path: firmware/build/release/${{ matrix.board }}/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-and-test, firmware-release]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            firmware-*/
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push development image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dev-env:latest
            ghcr.io/${{ github.repository }}/dev-env:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max