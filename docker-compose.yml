version: '3.8'

services:
  # Development environment
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: drone_dev
    hostname: drone-dev
    networks:
      - drone_network
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.ssh:/home/developer/.ssh:ro
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=42
      - GAZEBO_MODEL_PATH=/workspace/simulation/models
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "11311:11311"  # ROS Master
      - "11345:11345"  # ROS2 Discovery
      - "8080:8080"    # Web interface
      - "3000:3000"    # Development server
    command: /bin/bash

  # Simulation environment
  simulation:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: drone_simulation
    hostname: drone-sim
    networks:
      - drone_network
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=42
      - GAZEBO_MODEL_PATH=/workspace/simulation/models
    depends_on:
      - dev
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        cd /workspace/ros2_ws &&
        source install/setup.bash &&
        ros2 launch simulation drone_simulation.launch.py
      "

  # Hardware interface (for HIL testing)
  hardware:
    build:
      context: .
      dockerfile: Dockerfile
      target: firmware-dev
    container_name: drone_hardware
    hostname: drone-hw
    networks:
      - drone_network
    volumes:
      - .:/workspace
      - /dev:/dev
    environment:
      - ROS_DOMAIN_ID=42
    privileged: true
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0  # Serial devices
      - /dev/ttyACM0:/dev/ttyACM0  # Arduino/STM32
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        cd /workspace &&
        echo 'Hardware interface ready for HIL testing'
      "

  # Testing environment
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: drone_test
    hostname: drone-test
    networks:
      - drone_network
    volumes:
      - .:/workspace
      - ./tests/results:/workspace/test_results
    environment:
      - ROS_DOMAIN_ID=43  # Different domain for isolation
      - PYTHONPATH=/workspace
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        cd /workspace &&
        python -m pytest tests/ -v --cov=. --cov-report=html:test_results/coverage
      "

  # Documentation server
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: drone_docs
    hostname: drone-docs
    networks:
      - drone_network
    volumes:
      - .:/workspace
      - ./docs/_build:/workspace/docs/_build
    ports:
      - "8000:8000"
    command: >
      bash -c "
        cd /workspace/docs &&
        python -m http.server 8000
      "

  # Database for logging (optional)
  database:
    image: postgres:15
    container_name: drone_db
    hostname: drone-db
    networks:
      - drone_network
    environment:
      - POSTGRES_DB=drone_logs
      - POSTGRES_USER=drone
      - POSTGRES_PASSWORD=drone_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  # Monitoring and logging
  monitoring:
    image: grafana/grafana:latest
    container_name: drone_monitoring
    hostname: drone-monitor
    networks:
      - drone_network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - database

networks:
  drone_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  grafana_data: